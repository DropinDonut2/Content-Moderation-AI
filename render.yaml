services:
  - type: web
    name: content-moderation-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AI_MODEL
        value: anthropic/claude-3-haiku
      - key: CONFIDENCE_THRESHOLD
        value: 0.7
      - key: JWT_SECRET
        sync: false
      - key: AUTH_USERNAME
        sync: false
      - key: AUTH_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        sync: false
